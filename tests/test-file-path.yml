name: Test file-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create comment file
        run: |
          echo "This is a comment from a file." > /tmp/comment.md
      - id: action
        uses: .
        continue-on-error: true
        with:
          file-path: "/tmp/comment.md"
          pr-number: "1"
          github-token: "fake-token-for-testing"
      - name: Assert action was invoked with file-path input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with file-path input"
